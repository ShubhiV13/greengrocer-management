{% extends "base.html" %}
{% block content %}

<h2>👥 Registered Users</h2>

<table class="table table-bordered">
    <thead class="table-dark">
        <tr>
            <th>ID</th>
            <th>Username</th>
        </tr>
    </thead>

    <tbody>
        {% for u in users %}
        <tr>
            <td>{{ u.id }}</td>
            <td>{{ u.username }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
